# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
# Required for Next.js apps
runtime: nodejs20

# Set a timeout for server actions
serverActions:
  timeoutSeconds: 120

env:
  # CHANGE THIS LINE: Use a non-reserved name like FIREBASE_ADMIN_KEY
  - variable: FIREBASE_ADMIN_KEY
    secret: FIREBASE_ADMIN_KEY
    availability:
      - BUILD
      - RUNTIME

