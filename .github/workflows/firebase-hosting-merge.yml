# github.com

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: '${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}'
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: '${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}'
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'studio-8509111427-a45a7'
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: '${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}'
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}'
      NEXT_PUBLIC_FIREBASE_APP_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}'
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}'
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # NEW STEP: Create the service account file reliably using the raw JSON secret
      - name: Create service account file
        uses: peter-evans/create-or-update-file-action@v2
        with:
          path: app/service_account_key.json
          contents: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAW }}
          encoding: 'utf-8'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies and build
        working-directory: ./app
        run: |
          # Define the absolute path to the file created in the previous step
          KEY_FILE_PATH="${GITHUB_WORKSPACE}/app/service_account_key.json"
          
          # Set the STANDARD Google environment variable with the ABSOLUTE path
          export GOOGLE_APPLICATION_CREDENTIALS="$KEY_FILE_PATH"
          
          # Run the build command
          npm ci && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAW }}'
          channelId: live
          projectId: studio-8509111427-a45a7
          entryPoint: "./app"
          force: true

