# github.com

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # Define environment details once at the job level if desired
    environment:
      name: production
      url: https://studio-8509111427-a45a7.web.app
    defaults:
      run:
        # This working directory will apply to all 'run' steps in this job
        working-directory: 'app/wilfredwong/app'
    steps:
      - uses: actions/checkout@v4
      
      # Step 1: Install dependencies and build the Next.js app
      - name: Build Next.js app
        run: npm ci && npm run build
        env:
          # Expose build-time environment variables only during the build step
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          NEXT_PUBLIC_FIREBASE_API_KEY: '${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}'
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'studio-8509111427-a45a7'
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: '${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}'
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}'
          NEXT_PUBLIC_FIREBASE_APP_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}'
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}'
          
      # Step 2: Deploy to Firebase Hosting using the official action
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: studio-8509111427-a45a7
        # The deploy action leverages web frameworks support internally.
        # This specific environment variable is usually not necessary if your firebase.json
        # is correctly configured for web frameworks, but leaving it here doesn't hurt.
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

