name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # Define job-level environment variables to be available to all steps
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: '${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}'
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: '${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}'
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'studio-8509111427-a45a7'
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: '${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}'
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}'
      NEXT_PUBLIC_FIREBASE_APP_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}'
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}'
      FIREBASE_CLI_EXPERIMENTS: webframeworks # Required for Next.js support

    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        working-directory: ./app
        run: |
          # Use GITHUB_WORKSPACE (an absolute path) to reference the file correctly
          KEY_FILE_PATH="${GITHUB_WORKSPACE}/app/service_account_key.json"

          # 1. Decode the Base64 secret into the temporary file using the absolute path
          echo "${{ secrets.SERVICE_ACCOUNT_B64 }}" | base64 -d > "$KEY_FILE_PATH"
          
          # 2. Set environment variables using the absolute path
          export GOOGLE_APPLICATION_CREDENTIALS="$KEY_FILE_PATH"
          export SERVICE_ACCOUNT_JSON="$KEY_FILE_PATH"
          
          # 3. Run the build command
          npm ci && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          # Use the secret that holds the RAW JSON content for authentication
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAW }}'
          channelId: live
          projectId: studio-8509111427-a45a7
          entryPoint: "./app"
          force: true

