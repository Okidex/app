name: Deploy to Firebase Hosting on PR
'on': pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    # This condition ensures the secrets are available only for PRs within the same repository
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    
    # Define job-level environment variables (for non-secret vars)
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: '${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}'
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: '${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}'
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'studio-8509111427-a45a7'
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: '${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}'
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}'
      NEXT_PUBLIC_FIREBASE_APP_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}'
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}'
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    steps:
      - uses: actions/checkout@v4
        with:
          path: app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        working-directory: ./app
        run: |
          # 1. Decode the Base64 secret from GitHub into a temporary file
          echo "${{ secrets.SERVICE_ACCOUNT_JSON }}" | base64 -d > service_account_key.json
          # 2. Set environment variables to point to the new file path for the build command
          export GOOGLE_APPLICATION_CREDENTIALS=./service_account_key.json
          export SERVICE_ACCOUNT_JSON=./service_account_key.json
          # 3. Run the build command
          npm ci && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          # Pass the raw secret to the Firebase Action input
          firebaseServiceAccount: '${{ secrets.SERVICE_ACCOUNT_JSON }}'
          projectId: studio-8509111427-a45a7
          entryPoint: "./app"
          force: true
        env:
          # Ensure the DECODED file path is available for the deploy action if needed
          GOOGLE_APPLICATION_CREDENTIALS: './app/service_account_key.json'

