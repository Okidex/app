# This file was auto-generated by the Firebase CLI
# github.com

name: Deploy to Firebase Hosting on PR
'on': pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # STEP 1: Build the app inside the 'app' directory
      - name: Install dependencies and build within the app directory
        # Use 'cd app &&' to change directory manually before running npm commands
        run: cd app && npm ci && npm run build
        env:
          FIREBASE_SERVICE_ACCOUNT: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          NEXT_PUBLIC_FIREBASE_API_KEY: '${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}'
          # ... (rest of your env variables) ...
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: '${{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}'
      
      # STEP 2: Copy firebase.json to the root for the deploy action
      - name: Copy firebase.json to root
        run: cp app/firebase.json firebase.json
        # Note: If your firebase.json refers to a 'public' directory within 'app', this might need adjustment.

      # STEP 3: Deploy from the root
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: studio-8509111427-a45a7
          # entryPoint removed, as firebase.json is now in the root
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

