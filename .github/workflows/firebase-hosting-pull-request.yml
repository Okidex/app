name: Deploy to Firebase Hosting on PR
'on': pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create app directory
        run: mkdir -p Users/wilfredwong/app
      - name: Create service account file
        run: printf '%s' '${{ secrets.SERVICE_ACCOUNT_JSON }}' > Users/wilfredwong/app/service_account_key.json
      - name: Install dependencies and build
        working-directory: ./Users/wilfredwong/app
        run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.SERVICE_ACCOUNT_JSON }}'
          projectId: studio-8509111427-a45a7
          entryPoint: ./Users/wilfredwong/app
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
