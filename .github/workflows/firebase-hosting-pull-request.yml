name: Deploy to Firebase Hosting on PR

'on': pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    # Only runs if the PR is from the same repository (security best practice for secrets access)
    if: '${% raw %}{{ github.event.pull_request.head.repo.full_name == github.repository }}{% endraw %}'
    runs-on: ubuntu-latest
    # Environment variables for the entire job
    env:
      FIREBASE_SERVICE_ACCOUNT: ${% raw %}{{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDIO8509111427_A45A7 }}{% endraw %}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${% raw %}{{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}{% endraw %}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${% raw %}{{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}{% endraw %}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: "studio-8509111427-a45a7"
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${% raw %}{{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}{% endraw %}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${% raw %}{{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}{% endraw %}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${% raw %}{{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}{% endraw %}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${% raw %}{{ vars.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}{% endraw %}
    
    steps:
      - uses: actions/checkout@v4
      
      # Explicitly set up Node.js environment
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies and build
        # FIX: Changed working directory from ./ to ./app based on previous error logs
        working-directory: ./app
        run: npm ci && npm run build
        
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${% raw %}{{ secrets.GITHUB_TOKEN }}{% endraw %}'
          firebaseServiceAccount: '${% raw %}{{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDIO8509111427_A45A7 }}{% endraw %}'
          projectId: studio-8509111427-a45a7
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

