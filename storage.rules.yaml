
rules_version = '2';

service firebase.storage {
  match /b/{bucket}/o {
    // Allow public read on all files
    match /{allPaths=**} {
      allow read;
    }

    // Allow authenticated users to write to their own avatar directory
    match /avatars/{userId}/{allPaths=**} {
      allow write: if request.auth != null && request.auth.uid == userId;
    }

    // Allow authenticated users to write to the logos directory
    match /logos/{allPaths=**} {
      allow write: if request.auth != null;
    }
  }
}

